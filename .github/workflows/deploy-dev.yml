name: Deploy (dev)

on:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: CDK deploy
        working-directory: infra
        run: npx cdk deploy Summarizinator-dev --require-approval never
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CERT_ARN: ${{ secrets.CERT_ARN_DEV }}

      - name: Get stack outputs
        id: outputs
        run: |
          STACK=$(aws cloudformation describe-stacks --stack-name Summarizinator-dev \
            --query "Stacks[0].Outputs" --output json)
          echo "bucket=$(echo $STACK | jq -r '.[] | select(.OutputKey=="SiteBucketName") | .OutputValue')" >> $GITHUB_OUTPUT
          echo "dist_id=$(echo $STACK | jq -r '.[] | select(.OutputKey=="DistributionId") | .OutputValue')" >> $GITHUB_OUTPUT
          echo "user_pool_id=$(echo $STACK | jq -r '.[] | select(.OutputKey=="UserPoolId") | .OutputValue')" >> $GITHUB_OUTPUT
          echo "user_pool_client_id=$(echo $STACK | jq -r '.[] | select(.OutputKey=="UserPoolClientId") | .OutputValue')" >> $GITHUB_OUTPUT
          echo "cognito_domain=$(echo $STACK | jq -r '.[] | select(.OutputKey=="CognitoDomain") | .OutputValue')" >> $GITHUB_OUTPUT

      - name: Build frontend
        run: npm run build --workspace=frontend
        env:
          VITE_GITHUB_CLIENT_ID: ${{ secrets.GH_CLIENT_ID_DEV }}
          VITE_JIRA_CLIENT_ID: ${{ secrets.JIRA_CLIENT_ID_DEV }}
          VITE_COGNITO_USER_POOL_ID: ${{ steps.outputs.outputs.user_pool_id }}
          VITE_COGNITO_CLIENT_ID: ${{ steps.outputs.outputs.user_pool_client_id }}
          VITE_COGNITO_DOMAIN: ${{ steps.outputs.outputs.cognito_domain }}

      - name: Sync frontend to S3
        run: aws s3 sync frontend/dist/ s3://${{ steps.outputs.outputs.bucket }}/ --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.outputs.outputs.dist_id }} \
            --paths "/*"
